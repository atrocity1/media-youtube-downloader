<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Video Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen m-0">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700 text-center">
        <h1 class="text-3xl font-extrabold text-red-500 mb-2">YT Downloader</h1>
        <p class="text-slate-400 text-sm mb-6">Enter the video URL to start your MP4 download</p>
        
        <form action="http://localhost:8080/download" method="POST" class="space-y-4">
            <input 
                type="url" 
                name="url" 
                placeholder="https://www.youtube.com/watch?v=..." 
                required
                class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500"
            >
            <button 
                type="submit" 
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer shadow-lg shadow-red-900/40"
            >
                Download Video
            </button>
        </form>
    </div>

</body>
</html>
