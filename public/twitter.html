<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#15202b] text-white flex justify-center items-center h-screen m-0 select-none">

    <div class="bg-[#192734] p-8 rounded-2xl shadow-2xl text-center w-[400px] border border-[#38444d]">
        <h1 class="text-[#1da1f2] text-2xl font-black mb-6 tracking-wide">
            X / Twitter Video Downloader
        </h1>
        
        <form action="http://localhost:8080/download" method="POST" class="space-y-5">
            <div>
                <input 
                    type="text" 
                    name="url" 
                    placeholder="Paste tweet link here..." 
                    required
                    class="w-full px-5 py-3 rounded-full bg-[#253341] border border-[#38444d] text-white text-sm outline-none placeholder-[#8899a6] focus:border-[#1da1f2] focus:ring-1 focus:ring-[#1da1f2] transition-all"
                >
            </div>
            
            <button 
                type="submit" 
                class="w-full bg-[#1da1f2] hover:bg-[#1a91da] text-white font-bold py-3 px-6 rounded-full transition-colors duration-200 shadow-md active:scale-[0.98]"
            >
                Download Video
            </button>
        </form>

        <p class="text-xs text-[#8899a6] mt-5">
            Note: Processing and downloading may take a few seconds.
        </p>
    </div>

</body>
</html>
